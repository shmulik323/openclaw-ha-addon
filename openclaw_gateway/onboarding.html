<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenClaw Onboarding</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
    <style>
      :root {
        --bg: #0f172a;
        --surface: #1e293b;
        --primary: #38bdf8;
        --text: #f1f5f9;
        --muted: #94a3b8;
      }
      body {
        background-color: var(--bg);
        color: var(--text);
        font-family:
          "Inter",
          -apple-system,
          BlinkMacSystemFont,
          sans-serif;
        margin: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        overflow: hidden;
      }
      .container {
        width: 90%;
        max-width: 800px;
        background: var(--surface);
        padding: 2rem;
        border-radius: 1rem;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      h1 {
        color: var(--primary);
        margin-top: 0;
        font-weight: 700;
        letter-spacing: -0.025em;
      }
      p {
        color: var(--muted);
        line-height: 1.5;
        margin-bottom: 2rem;
      }
      #terminal {
        height: 400px;
        background: #000;
        border-radius: 0.5rem;
        padding: 1rem;
        margin-bottom: 1.5rem;
        border: 1px solid rgba(255, 255, 255, 0.05);
      }
      .actions {
        display: flex;
        gap: 1rem;
      }
      button {
        background: var(--primary);
        color: #000;
        border: none;
        padding: 0.75rem 1.5rem;
        border-radius: 0.5rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
      }
      button:hover {
        filter: brightness(1.1);
        transform: translateY(-1px);
      }
      button:disabled {
        background: var(--muted);
        cursor: not-allowed;
        transform: none;
      }
      .status {
        font-size: 0.875rem;
        color: var(--muted);
        margin-top: 1rem;
      }
      .loader {
        display: inline-block;
        width: 1rem;
        height: 1rem;
        border: 2px solid var(--muted);
        border-top-color: transparent;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-right: 0.5rem;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>OpenClaw Onboarding</h1>
      <p>
        Welcome to OpenClaw. This add-on requires a one-time setup to initialize
        the daemon and workspace. Click the button below to start the
        terminal-based setup.
      </p>

      <div id="terminal"></div>

      <div class="actions">
        <button id="startBtn" disabled>Start Onboarding</button>
        <button id="launchBtn" style="display: none">Launch OpenClaw</button>
      </div>
      <div class="status" id="statusLine">Ready to start</div>
    </div>

    <script>
      const startBtn = document.getElementById("startBtn");
      const statusLine = document.getElementById("statusLine");
      const term = new Terminal({
        theme: {
          background: "#0a0a0a",
          foreground: "#f1f5f9",
        },
        fontFamily: "JetBrains Mono, monospace",
        fontSize: 14,
        cursorBlink: true,
      });
      term.open(document.getElementById("terminal"));
      term.writeln("\x1b[36mWaiting for connection...\x1b[0m");

      const pageUrl = new URL(window.location.href);
      const basePath = pageUrl.pathname.endsWith("/")
        ? pageUrl.pathname
        : `${pageUrl.pathname}/`;
      const baseUrl = new URL(basePath, pageUrl.origin);
      const healthUrl = new URL("health", baseUrl);
      const shutdownUrl = new URL("shutdown", baseUrl);
      const wsUrl = new URL(baseUrl);
      wsUrl.protocol = wsUrl.protocol === "https:" ? "wss:" : "ws:";

      let ws;

      function connect() {
        ws = new WebSocket(wsUrl.toString());

        ws.onopen = () => {
          startBtn.disabled = false;
          statusLine.innerText = "Ready to start";
          term.writeln("\x1b[32mConnected to setup server.\x1b[0m");
          term.writeln(
            "Press the button to run openclaw onboard --install-daemon",
          );
        };

        ws.onmessage = (e) => {
          term.write(e.data);
          if (
            e.data.includes("Onboarding complete!") ||
            e.data.includes("Initialization complete")
          ) {
            checkReady();
          }
        };

        ws.onerror = () => {
          startBtn.disabled = true;
          statusLine.innerText =
            "Could not connect to the onboarding server. Reload the add-on page.";
          term.writeln(
            "\r\n\x1b[31mWebSocket connection failed. Reload the add-on page.\x1b[0m",
          );
        };

        ws.onclose = () => {
          startBtn.disabled = true;
        };
      }

      connect();

      term.onData((data) => {
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(data);
        }
      });

      startBtn.onclick = () => {
        if (!ws || ws.readyState !== WebSocket.OPEN) {
          statusLine.innerText =
            "The onboarding connection is not ready. Reload the add-on page.";
          return;
        }
        startBtn.disabled = true;
        statusLine.innerHTML =
          '<span class="loader"></span>Running onboard command...';
        ws.send("START_ONBOARD");
      };

      async function checkReady() {
        try {
          const res = await fetch(healthUrl, { cache: "no-store" });
          const data = await res.json();
          if (data.status === "ready") {
            startBtn.style.display = "none";
            statusLine.innerText =
              "Setup complete. Waiting for OpenClaw to start...";

            await fetch(shutdownUrl, { cache: "no-store" });

            const pollGateway = async () => {
              try {
                const res = await fetch(baseUrl, { cache: "no-store" });
                if (res.ok || res.status === 401 || res.status === 302) {
                  location.reload();
                  return;
                }
              } catch (e) {
                // The onboarding server exits before the gateway is ready.
              }
              setTimeout(pollGateway, 1500);
            };

            setTimeout(pollGateway, 2000);
            return;
          }
        } catch (e) {
          // Retry until onboarding writes the config or the gateway comes up.
        }
        setTimeout(checkReady, 2000);
      }
    </script>
  </body>
</html>
