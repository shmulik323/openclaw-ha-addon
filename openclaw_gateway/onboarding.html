<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenClaw Terminal</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
    <style>
      :root {
        --bg-top: #091124;
        --bg-bottom: #101b31;
        --surface: rgba(25, 36, 60, 0.92);
        --surface-border: rgba(123, 151, 197, 0.16);
        --panel: rgba(7, 12, 22, 0.92);
        --panel-border: rgba(104, 170, 255, 0.18);
        --primary: #46b3ff;
        --text: #edf4ff;
        --muted: #a9b8d1;
        --shadow: 0 24px 70px rgba(0, 0, 0, 0.45);
      }
      html,
      body {
        min-height: 100vh;
      }
      body {
        background:
          radial-gradient(circle at top left, rgba(70, 179, 255, 0.14), transparent 28%),
          radial-gradient(circle at bottom right, rgba(151, 240, 198, 0.12), transparent 24%),
          linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
        color: var(--text);
        font-family:
          "IBM Plex Sans",
          -apple-system,
          BlinkMacSystemFont,
          sans-serif;
        margin: 0;
        overflow-x: hidden;
        overflow-y: auto;
      }
      .container {
        box-sizing: border-box;
        width: 100vw;
        min-height: 100vh;
        padding: clamp(14px, 2vw, 28px);
        display: flex;
        flex-direction: column;
        gap: 14px;
      }
      .hero {
        background: var(--surface);
        border: 1px solid var(--surface-border);
        border-radius: 22px;
        box-shadow: var(--shadow);
        padding: clamp(18px, 2.2vw, 30px);
      }
      h1 {
        color: var(--primary);
        margin-top: 0;
        font-weight: 700;
        letter-spacing: -0.025em;
        margin-bottom: 0.45rem;
        font-size: clamp(2.1rem, 3vw, 3.4rem);
      }
      p {
        color: var(--muted);
        line-height: 1.5;
        margin: 0;
        max-width: 1100px;
        font-size: clamp(1.02rem, 1.25vw, 1.35rem);
      }
      .tips {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        color: var(--muted);
        font-size: 0.96rem;
        padding: 0 2px;
      }
      .tip {
        background: rgba(18, 28, 48, 0.76);
        border: 1px solid rgba(151, 240, 198, 0.12);
        border-radius: 999px;
        padding: 0.45rem 0.8rem;
      }
      .terminal-shell {
        flex: 1 1 auto;
        min-height: 70vh;
        max-height: calc(100vh - 190px);
        background: var(--panel);
        border: 1px solid var(--panel-border);
        border-radius: 22px;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04), var(--shadow);
        padding: 14px;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .terminal-toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        flex-wrap: wrap;
        padding: 0 2px 12px;
      }
      #terminal {
        flex: 1;
        min-height: 0;
        width: 100%;
        background: #05080f;
        border-radius: 14px;
        padding: 12px;
        border: 1px solid rgba(255, 255, 255, 0.05);
        box-sizing: border-box;
      }
      button {
        background: var(--primary);
        color: #04111f;
        border: none;
        padding: 0.9rem 1.7rem;
        border-radius: 0.9rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        font-size: 1rem;
        min-width: 220px;
        box-shadow: 0 8px 30px rgba(70, 179, 255, 0.22);
      }
      button:hover {
        filter: brightness(1.1);
        transform: translateY(-1px);
      }
      button:disabled {
        background: var(--muted);
        cursor: not-allowed;
        transform: none;
      }
      .status {
        font-size: 0.98rem;
        color: var(--muted);
        display: flex;
        align-items: center;
        gap: 0.7rem;
        flex: 1 1 260px;
        justify-content: flex-end;
        min-height: 1.5rem;
      }
      .loader {
        display: inline-block;
        width: 1.1rem;
        height: 1.1rem;
        border: 2px solid var(--muted);
        border-top-color: transparent;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      .xterm-viewport {
        scrollbar-width: thin;
      }
      .xterm {
        height: 100%;
      }
      .xterm-screen {
        width: 100% !important;
      }
      @media (max-width: 800px) {
        .terminal-shell {
          min-height: 62vh;
          max-height: none;
        }
        .terminal-toolbar {
          align-items: stretch;
        }
        .status {
          justify-content: flex-start;
        }
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="hero">
        <h1>OpenClaw Terminal</h1>
        <p>Loading terminal details...</p>
      </div>

      <div class="tips"></div>

      <div class="terminal-shell">
        <div class="terminal-toolbar">
          <button id="startBtn" disabled>Start</button>
          <div class="status" id="statusLine">Ready to start</div>
        </div>
        <div id="terminal"></div>
      </div>
    </div>

    <script>
      const terminalConfig = __OPENCLAW_TERMINAL_CONFIG__;
      const startBtn = document.getElementById("startBtn");
      const statusLine = document.getElementById("statusLine");
      const terminalHost = document.getElementById("terminal");
      const tipsHost = document.querySelector(".tips");

      document.title = terminalConfig.title;
      document.querySelector("h1").textContent = terminalConfig.title;
      document.querySelector(".hero p").textContent = terminalConfig.description;
      startBtn.textContent = terminalConfig.startLabel;
      tipsHost.innerHTML = "";
      terminalConfig.tips.forEach((tip) => {
        const tipEl = document.createElement("div");
        tipEl.className = "tip";
        tipEl.textContent = tip;
        tipsHost.appendChild(tipEl);
      });

      const term = new Terminal({
        theme: {
          background: "#05080f",
          foreground: "#edf4ff",
          cursor: "#46b3ff",
          selectionBackground: "rgba(70, 179, 255, 0.28)",
          black: "#05080f",
          brightBlack: "#7e8ca6",
        },
        fontFamily: '"IBM Plex Mono", "JetBrains Mono", monospace',
        fontSize: 17,
        lineHeight: 1.24,
        letterSpacing: 0.2,
        cursorBlink: true,
        convertEol: true,
        scrollback: 5000,
        allowTransparency: true,
      });
      const fitAddon = new FitAddon.FitAddon();
      term.loadAddon(fitAddon);
      term.open(terminalHost);
      term.focus();
      term.writeln("\x1b[36mWaiting for connection...\x1b[0m");
      terminalHost.addEventListener("click", () => {
        term.focus();
      });

      const pageUrl = new URL(window.location.href);
      const basePath = pageUrl.pathname.endsWith("/")
        ? pageUrl.pathname
        : `${pageUrl.pathname}/`;
      const baseUrl = new URL(basePath, pageUrl.origin);
      const healthUrl = new URL("health", baseUrl);
      const shutdownUrl = new URL("shutdown", baseUrl);
      const wsUrl = new URL(baseUrl);
      wsUrl.protocol = wsUrl.protocol === "https:" ? "wss:" : "ws:";

      let ws;
      let fitTimer = null;
      let processRunning = false;
      let hasAutoStarted = false;

      function renderStatus(text, loading = false) {
        statusLine.innerHTML = loading
          ? `<span class="loader"></span>${text}`
          : text;
      }

      function sendResize() {
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(
            JSON.stringify({
              type: "resize",
              cols: term.cols,
              rows: term.rows,
            }),
          );
        }
      }

      function fitTerminal() {
        clearTimeout(fitTimer);
        fitTimer = setTimeout(() => {
          fitAddon.fit();
          sendResize();
        }, 30);
      }

      function handleControlFrame(payload) {
        const control = JSON.parse(payload.slice(1));
        if (control.type !== "process_state") {
          return;
        }

        processRunning = Boolean(control.running);
        startBtn.disabled = processRunning;
        if (!processRunning) {
          if (terminalConfig.mode === "tui") {
            startBtn.textContent = "Restart TUI";
            renderStatus(
              control.code === 0
                ? "Terminal UI exited cleanly. Start it again whenever you need it."
                : `Terminal UI exited with code ${control.code ?? "?"}.`,
            );
          } else if (control.code && control.code !== 0) {
            renderStatus(`Onboarding exited with code ${control.code}.`);
          }
        }
      }

      function startTerminalSession() {
        if (!ws || ws.readyState !== WebSocket.OPEN) {
          renderStatus(
            "The terminal connection is not ready. Reload the add-on page.",
          );
          return;
        }
        startBtn.disabled = true;
        fitTerminal();
        renderStatus(terminalConfig.runningStatus, true);
        ws.send(
          JSON.stringify({
            type: "start",
            cols: term.cols,
            rows: term.rows,
          }),
        );
        term.focus();
      }

      function connect() {
        ws = new WebSocket(wsUrl.toString());

        ws.onopen = () => {
          startBtn.disabled = false;
          renderStatus("Ready to start");
          fitTerminal();
          term.writeln(`\x1b[32m${terminalConfig.connectLine}\x1b[0m`);
          term.writeln(terminalConfig.readyLine);
          if (terminalConfig.autoStart && !hasAutoStarted) {
            hasAutoStarted = true;
            startTerminalSession();
          }
        };

        ws.onmessage = (e) => {
          if (typeof e.data === "string" && e.data.startsWith("\u0000")) {
            handleControlFrame(e.data);
            return;
          }
          term.write(e.data);
          if (
            terminalConfig.mode === "onboarding" &&
            (e.data.includes("Onboarding complete!") ||
              e.data.includes("Initialization complete"))
          ) {
            checkReady();
          }
        };

        ws.onerror = () => {
          startBtn.disabled = true;
          renderStatus(
            "Could not connect to the terminal server. Reload the add-on page.",
          );
          term.writeln(
            "\r\n\x1b[31mWebSocket connection failed. Reload the add-on page.\x1b[0m",
          );
        };

        ws.onclose = () => {
          startBtn.disabled = true;
        };
      }

      connect();
      fitTerminal();
      window.addEventListener("resize", fitTerminal);
      if (typeof ResizeObserver !== "undefined") {
        const observer = new ResizeObserver(() => fitTerminal());
        observer.observe(terminalHost);
      }

      term.onData((data) => {
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(data);
        }
      });

      startBtn.onclick = () => {
        startTerminalSession();
      };

      async function checkReady() {
        try {
          const res = await fetch(healthUrl, { cache: "no-store" });
          const data = await res.json();
          if (data.status === "ready") {
            startBtn.style.display = "none";
            renderStatus("Setup complete. Waiting for OpenClaw to start...");

            await fetch(shutdownUrl, { cache: "no-store" });

            const pollGateway = async () => {
              try {
                const res = await fetch(baseUrl, { cache: "no-store" });
                if (res.ok || res.status === 401 || res.status === 302) {
                  location.reload();
                  return;
                }
              } catch (e) {
                // The onboarding server exits before the next ingress target is ready.
              }
              setTimeout(pollGateway, 1500);
            };

            setTimeout(pollGateway, 2000);
            return;
          }
        } catch (e) {
          // Retry until onboarding writes the config or the next ingress target comes up.
        }
        setTimeout(checkReady, 2000);
      }
    </script>
  </body>
</html>
