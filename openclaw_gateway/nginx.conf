map $http_x_forwarded_host $openclaw_forward_host {
    default $http_x_forwarded_host;
    "" $http_host;
}

map $http_x_forwarded_proto $openclaw_forward_proto {
    default $http_x_forwarded_proto;
    "" $scheme;
}

map $http_x_forwarded_port $openclaw_forward_port {
    default $http_x_forwarded_port;
    "" $server_port;
}

map $http_x_forwarded_for $openclaw_forwarded_for {
    default $http_x_forwarded_for;
    "" $proxy_add_x_forwarded_for;
}

map $http_origin $openclaw_forward_origin {
    default $http_origin;
    "" $openclaw_forward_proto://$openclaw_forward_host;
}

map $http_upgrade $openclaw_connection_upgrade {
    default upgrade;
    "" close;
}

server {
    listen 8099;
    allow 172.30.32.2;
    allow 127.0.0.1;
    allow ::1;
    deny all;

    location / {
        proxy_pass http://127.0.0.1:__UPSTREAM_PORT__;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $openclaw_connection_upgrade;
        proxy_set_header Host $openclaw_forward_host;
        proxy_set_header Origin $openclaw_forward_origin;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $openclaw_forwarded_for;
        proxy_set_header X-Forwarded-Host $openclaw_forward_host;
        proxy_set_header X-Forwarded-Port $openclaw_forward_port;
        proxy_set_header X-Forwarded-Proto $openclaw_forward_proto;
        proxy_set_header Accept-Encoding "";
        # Home Assistant ingress renders this page inside an iframe. The upstream
        # Control UI denies all framing, so relax that policy only on the ingress
        # proxy path and keep the standalone gateway behavior unchanged.
        proxy_hide_header X-Frame-Options;
        proxy_hide_header Content-Security-Policy;
        proxy_hide_header Content-Security-Policy-Report-Only;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Content-Security-Policy "frame-ancestors 'self'" always;
        sub_filter_once on;
        sub_filter '</head>' '<script>(function(){var tokenB64="__GATEWAY_TOKEN_B64__";var url=new URL(location.href);var hash=new URLSearchParams(url.hash.startsWith("#")?url.hash.slice(1):url.hash);var query=new URLSearchParams(url.search);var basePath=location.pathname.endsWith("/")?location.pathname:location.pathname+"/";var gatewayUrl=(location.protocol==="https:"?"wss:":"ws:")+"//"+location.host+basePath;if(!hash.get("gatewayUrl")&&!query.get("gatewayUrl")){hash.set("gatewayUrl",gatewayUrl);}if(tokenB64&&!hash.get("token")&&!query.get("token")){hash.set("token",atob(tokenB64));}var nextHash=hash.toString();var nextUrl=url.origin+url.pathname+url.search+(nextHash?"#"+nextHash:"");if(nextUrl!==location.href){location.replace(nextUrl);}})();</script></head>';
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
        proxy_buffering off;
    }
}
