server {
    listen 8099;
    allow 172.30.32.2;
    allow 127.0.0.1;
    allow ::1;
    deny all;

    location / {
        proxy_pass http://127.0.0.1:__UPSTREAM_PORT__;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Accept-Encoding "";
        # Home Assistant ingress renders this page inside an iframe. The upstream
        # Control UI denies all framing, so relax that policy only on the ingress
        # proxy path and keep the standalone gateway behavior unchanged.
        proxy_hide_header X-Frame-Options;
        proxy_hide_header Content-Security-Policy;
        proxy_hide_header Content-Security-Policy-Report-Only;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Content-Security-Policy "frame-ancestors 'self'" always;
        sub_filter_once on;
        sub_filter '</head>' '<script>(function(){var tokenB64="__GATEWAY_TOKEN_B64__";if(!tokenB64){return;}var token=atob(tokenB64);var hash=new URLSearchParams(location.hash.startsWith("#")?location.hash.slice(1):location.hash);var query=new URLSearchParams(location.search);if(hash.get("token")||query.get("token")){return;}hash.set("token",token);var url=new URL(location.href);url.hash=hash.toString();location.replace(url.toString());})();</script></head>';
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
        proxy_buffering off;
    }
}
